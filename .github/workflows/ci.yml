name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            e2e/package-lock.json

      - name: Build backend
        run: dotnet build
        working-directory: backend/CalendarBooking.Api

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Install E2E dependencies
        run: npm ci
        working-directory: e2e

      - name: Copy frontend to backend wwwroot
        run: |
          rm -rf wwwroot
          mkdir -p wwwroot
          cp -r ../frontend/dist/* wwwroot/
        working-directory: backend/CalendarBooking.Api

      - name: Run Playwright tests (backend-served)
        run: npx playwright test --config=playwright.backend.config.ts
        working-directory: e2e

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

  release-please:
    if: github.event_name == 'push'
    needs: [integration-tests]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
