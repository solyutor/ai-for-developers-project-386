name: CI

on:
  push:

jobs:
  create-pr:
    if: github.ref_name != 'master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: master
          branch: ${{ github.ref_name }}
          title: "Auto PR: ${{ github.ref_name }}"
          body: "Automated PR created on push to ${{ github.ref_name }}."

  e2e-tests:
    if: github.ref_name != 'master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: |
            backend/CalendarBooking.Api/Frontend/package-lock.json
            e2e/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: backend/CalendarBooking.Api/Frontend

      - name: Build backend (also builds frontend in Release)
        run: dotnet build -c Release
        working-directory: backend/CalendarBooking.Api

      - name: Install E2E dependencies
        run: npm ci
        working-directory: e2e

      - name: Run Playwright tests (backend-served)
        run: npx playwright test --config=playwright.backend.config.ts
        working-directory: e2e

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

  release-please:
    if: github.ref_name == 'master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
